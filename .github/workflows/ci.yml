name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check github_ai_genius tests
      - name: Type check
        run: mypy github_ai_genius
      - name: Tests
        run: pytest --cov=github_ai_genius --cov-report=term-missing
